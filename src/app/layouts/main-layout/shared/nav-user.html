@let u = user();

<ul hlmSidebarMenu>
	<li hlmSidebarMenuItem>
		<button hlmSidebarMenuButton size="lg" [hlmDropdownMenuTrigger]="menu" [side]="_menuSide()" align="end">
			<hlm-avatar class="user-avatar">
				<img [src]="u.avatar" [alt]="u.name" hlmAvatarImage />
				<span hlmAvatarFallback>{{ u.name.slice(0, 2).toUpperCase() }}</span>
			</hlm-avatar>
			<div class="user-info">
				<span>{{ u.name }}</span>
				<span>{{ u.email }}</span>
			</div>
			<ng-icon name="lucideChevronsUpDown" class="menu-icon" />
		</button>
	</li>
</ul>

<ng-template #menu>
	<hlm-dropdown-menu>
		<hlm-dropdown-menu-label>
			<div class="menu-user">
				<hlm-avatar class="user-avatar">
					<img [src]="u.avatar" [alt]="u.name" hlmAvatarImage />
					<span hlmAvatarFallback>{{ u.name.slice(0, 2).toUpperCase() }}</span>
				</hlm-avatar>
				<div class="user-info">
					<span>{{ u.name }}</span>
					<span>{{ u.email }}</span>
				</div>
			</div>
		</hlm-dropdown-menu-label>

		<hlm-dropdown-menu-separator />

		<hlm-dropdown-menu-group>
			<button hlmDropdownMenuItem type="button" (click)="goToSettings()">
				<ng-icon name="lucideSettings" />
				Configuración
			</button>
		</hlm-dropdown-menu-group>

		<hlm-dropdown-menu-separator />

		<button hlmDropdownMenuItem type="button" (click)="logout()">
			<ng-icon name="lucideLogOut" />
			Cerrar Sesión
		</button>
	</hlm-dropdown-menu>
</ng-template>
