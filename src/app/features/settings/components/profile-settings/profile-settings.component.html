<section hlmCard>
	<div hlmCardHeader>
		<h2 hlmCardTitle>Mi Perfil</h2>
		<p hlmCardDescription>Actualiza tus datos personales.</p>
	</div>

	<div hlmCardContent>
		<label hlmLabel class="settings-field">
			Nombre
			<input hlmInput type="text" placeholder="Nombre completo" />
		</label>

		<label hlmLabel class="settings-field">
			Correo
			<input hlmInput type="email" placeholder="correo@empresa.com" />
		</label>

		<label hlmLabel class="settings-field">
			Teléfono
			<input hlmInput type="tel" placeholder="000 000 0000" />
		</label>
	</div>

	<div hlmCardFooter>
		<button hlmBtn type="button">Guardar</button>
	</div>
</section>
