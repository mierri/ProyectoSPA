<section hlmCard>
	<div hlmCardHeader>
		<h2 hlmCardTitle>Cambiar Contraseña</h2>
		<p hlmCardDescription>Actualiza tu contraseña de acceso.</p>
	</div>

	<div hlmCardContent>
		<label hlmLabel class="settings-field">
			Contraseña actual
			<input hlmInput type="password" autocomplete="current-password" />
		</label>

		<label hlmLabel class="settings-field">
			Nueva contraseña
			<input hlmInput type="password" autocomplete="new-password" />
		</label>

		<label hlmLabel class="settings-field">
			Confirmar contraseña
			<input hlmInput type="password" autocomplete="new-password" />
		</label>
	</div>

	<div hlmCardFooter>
		<button hlmBtn type="button">Guardar</button>
	</div>
</section>
