<hlm-card class="h-full">
	<hlm-card-header>
		<h3 hlmCardTitle>Notificaciones y Alertas</h3>
		<p hlmCardDescription>Actualizaciones importantes que requieren atencion.</p>
	</hlm-card-header>
	<div hlmCardContent class="space-y-3">
		@for (alert of items(); track alert.id) {
			<article class="bg-muted/35 rounded-lg border p-3">
				<div class="mb-2 flex items-center justify-between gap-2">
					<p class="text-sm font-medium">{{ alert.title }}</p>
					<span hlmBadge [variant]="alert.severityVariant">{{ alert.severityLabel }}</span>
				</div>
				<p class="text-muted-foreground text-sm">{{ alert.message }}</p>
				<p class="text-muted-foreground mt-2 text-xs">{{ alert.timeLabel }}</p>
			</article>
		}
	</div>
</hlm-card>
